<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="#0a0a0a"/>

  <!-- Scissors icon centered, white -->
  <!-- Left blade -->
  <circle cx="10" cy="22" r="2.8" fill="#0a0a0a" stroke="white" stroke-width="1.5"/>
  <!-- Right blade -->
  <circle cx="10" cy="10" r="2.8" fill="#0a0a0a" stroke="white" stroke-width="1.5"/>

  <!-- Scissors arms crossing -->
  <line x1="12.2" y1="20.2" x2="23" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12.2" y1="11.8" x2="23" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pivot dot -->
  <circle cx="17" cy="16" r="1" fill="white"/>

  <!-- Handle lines (right side) -->
  <line x1="23" y1="10" x2="26" y2="8" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="22" x2="26" y2="24" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
</svg>
